<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #001F3F;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #001F3F;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
    }

    /* Background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      background: #0074D9;
      filter: blur(90px);
      opacity: 0.07;
      pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; top: -150px; right: -80px; }
    .orb-2 { width: 300px; height: 300px; bottom: -100px; left: 200px; opacity: 0.05; }
    .orb-3 { width: 200px; height: 200px; top: 100px; left: -60px; opacity: 0.06; }

    /* Top electric accent line */
    .accent-line-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #0074D9 0%, rgba(0,116,217,0.3) 100%);
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      padding: 56px 72px;
      gap: 60px;
    }

    /* Left column */
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
    }

    .logo {
      height: 52px;
      width: auto;
      background: #ffffff;
      border-radius: 6px;
      padding: 5px 10px;
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #0074D9;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 52px;
      line-height: 1.06;
      letter-spacing: -0.02em;
      color: #ffffff;
    }

    .headline span {
      color: #0074D9;
    }

    .sub {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 20px;
      line-height: 1.55;
      color: #AAAAAA;
      max-width: 520px;
    }

    .cta-pill {
      display: inline-flex;
      align-items: center;
      background: #0074D9;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 16px;
      padding: 12px 28px;
      border-radius: 999px;
      gap: 8px;
      width: fit-content;
      letter-spacing: 0.01em;
    }

    /* Right column — circuit SVG */
    .right {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.85;
    }

    /* Bottom bar */
    .bottom-bar {
      position: relative;
      z-index: 1;
      height: 56px;
      border-top: 1px solid rgba(0,116,217,0.25);
      display: flex;
      align-items: center;
      padding: 0 72px;
      justify-content: space-between;
    }

    .bottom-url {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #7A8A9A;
      letter-spacing: 0.02em;
    }

    .bottom-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #0074D9;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Pulse nodes */
    .pulse-node {
      animation: nodePulse 2.4s ease-in-out infinite;
    }
    .pulse-node-2 { animation-delay: 0.8s; }
    .pulse-node-3 { animation-delay: 1.6s; }
    @keyframes nodePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="accent-line-top"></div>

    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="content">
      <!-- Left -->
      <div class="left">
        <div class="logo-wrap">
          <img src="./cavas_consulting_logo.png" alt="Cavas Consulting" class="logo" />
        </div>
        <div class="text-block">
          <p class="eyebrow">AI Consulting for SMBs</p>
          <h1 class="headline">Enterprise-Scale AI.<br /><span>Human-Scale</span><br />Implementation.</h1>
          <p class="sub">Enterprise AI engineering for small and mid-size businesses — without the enterprise price tag.</p>
        </div>
        <div class="cta-pill">
          Take the Free AI Readiness Scorecard &rarr;
        </div>
      </div>

      <!-- Right — circuit SVG -->
      <div class="right">
        <svg viewBox="0 0 320 400" xmlns="http://www.w3.org/2000/svg" width="320" height="400">
          <!-- Wires electric -->
          <g stroke="#0074D9" stroke-width="1.5" fill="none" opacity="0.65">
            <line x1="40"  y1="100" x2="130" y2="100" />
            <line x1="130" y1="100" x2="130" y2="170" />
            <line x1="130" y1="170" x2="200" y2="170" />
            <line x1="200" y1="170" x2="200" y2="240" />
            <line x1="200" y1="240" x2="290" y2="240" />
            <line x1="200" y1="100" x2="290" y2="100" />
            <line x1="200" y1="100" x2="200" y2="170" />
            <line x1="40"  y1="170" x2="80"  y2="170" />
            <line x1="80"  y1="170" x2="80"  y2="240" />
            <line x1="80"  y1="240" x2="130" y2="240" />
            <line x1="130" y1="240" x2="130" y2="300" />
            <line x1="40"  y1="300" x2="130" y2="300" />
            <line x1="290" y1="170" x2="290" y2="240" />
            <line x1="260" y1="40"  x2="260" y2="100" />
            <line x1="170" y1="40"  x2="260" y2="40" />
            <line x1="170" y1="40"  x2="170" y2="100" />
          </g>
          <!-- Wires slate -->
          <g stroke="#7A8A9A" stroke-width="1" fill="none" opacity="0.4">
            <line x1="80"  y1="100" x2="130" y2="100" />
            <line x1="80"  y1="40"  x2="80"  y2="100" />
            <line x1="40"  y1="40"  x2="80"  y2="40" />
            <line x1="290" y1="300" x2="200" y2="300" />
            <line x1="200" y1="300" x2="200" y2="240" />
          </g>
          <!-- Nodes electric -->
          <g fill="#0074D9">
            <circle cx="130" cy="100" r="6" />
            <circle cx="200" cy="100" r="6" />
            <circle cx="130" cy="170" r="5" />
            <circle cx="200" cy="170" r="6" />
            <circle cx="80"  cy="170" r="5" />
            <circle cx="200" cy="240" r="6" />
            <circle cx="290" cy="100" r="5" />
            <circle cx="290" cy="240" r="5" />
            <circle cx="170" cy="40"  r="5" />
            <circle cx="260" cy="40"  r="5" />
          </g>
          <!-- Nodes slate -->
          <g fill="#7A8A9A">
            <circle cx="40"  cy="100" r="4" />
            <circle cx="40"  cy="170" r="4" />
            <circle cx="40"  cy="300" r="4" />
            <circle cx="80"  cy="240" r="4" />
            <circle cx="130" cy="240" r="4" />
            <circle cx="130" cy="300" r="4" />
            <circle cx="80"  cy="40"  r="4" />
            <circle cx="260" cy="100" r="4" />
            <circle cx="290" cy="170" r="4" />
            <circle cx="200" cy="300" r="4" />
            <circle cx="290" cy="300" r="4" />
          </g>
          <!-- Pulse nodes -->
          <circle cx="200" cy="170" r="6" fill="#0074D9" class="pulse-node" />
          <circle cx="130" cy="100" r="6" fill="#0074D9" class="pulse-node pulse-node-2" />
          <circle cx="200" cy="240" r="6" fill="#0074D9" class="pulse-node pulse-node-3" />
        </svg>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <span class="bottom-url">bcavas.github.io/cavas-consulting-home</span>
      <span class="bottom-tagline">Cavas Consulting</span>
    </div>
  </div>
</body>
</html>
